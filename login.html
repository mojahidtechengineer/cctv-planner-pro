<div class="flex h-screen items-center justify-center bg-gray-900 text-white">
    <input id="pwd" type="password" class="text-black p-2" placeholder="Password">
    <button onclick="login()" class="bg-blue-500 p-2 ml-2">Enter</button>
</div>
<script>
    function login() {
        if(document.getElementById('pwd').value === "YOUR_PASSWORD") {
            sessionStorage.setItem("cctv_auth", "true");
            window.location.href = "dashboard.html";
        }
    }
</script>
